   - id: "incident-001"
     title: "DDoS 攻击"
     type: "incident"
     status: "investigating" # investigating, identified, monitoring, resolved
     affected_monitors: ["blog_eo"]
     start_time: "2026-01-04T12:37:00Z"
     updates:
       - timestamp: "2026-01-04T13:26:00Z"
         message: "有粉丝汇报分流域名国内节点418，核实是遭受了海外主机攻击。可以点击“博客国内节点”尝试访问，该节点不分流，目前访问正常"
         status: "monitoring"
       - timestamp: "2026-01-05T01:40:00Z"
         message: "我们已采用新的技术手段尝试修复该问题，并已发布更新，持续检测中。所有地区的访客通过统一入口 2x.nz 访问即可得到正常的路由和访问体验"
         status: "monitoring"

groups:
  - id: "my_services"
    name: "My Services"
    monitors:
      - id: "uptimekuma"
        name: "UptimeKuma"
        tags: [monitor]
        type: "http"
        url: "https://snean.eu.cc/monitor"
        method: "HEAD"
        timeout: 60000
        expected_latency: 1000
        grace_period: 3
        display:
          chart: true
          public_link: true
        validation:
          status: 200

      - id: "blog_cf"
        name: "博客海外节点"
        tags: [cfw]
        type: "http"
        url: "https://snean.eu.cc/"
        method: "HEAD"
        timeout: 60000
        expected_latency: 1000
        grace_period: 3
        display:
          chart: true
          public_link: true
        validation:
          status: 200
